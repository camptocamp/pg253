---
name: Build PG253 Docker Images
on:
  # Trigger every Sunday morning
  schedule:
    - cron: "2 2 * * SUN"
  push:
    branches: ['main']

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-docker-images:
    name: Build and Push Docker Image for PostgreSQL ${{ matrix.pg_version }}
    if: github.event_name == 'push' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
      artifact-metadata: write
    strategy:
      matrix:
        pg_version: [15, 16, 17, 18]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: "${{ env.REGISTRY }}"
          username: "${{ github.actor }}"
          password: "${{ secrets.GITHUB_TOKEN }}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch,suffix=-pg${{ matrix.pg_version }}
            type=sha,prefix=,suffix=-pg${{ matrix.pg_version }}

      - name: Build and push Docker Image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: |
            linux/amd64
            linux/arm64
          build-args: |
            POSTGRESQL_VERSION=${{ matrix.pg_version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
