---
services:
  pg253:
    build: .
    tty: true
    environment:
      SCHEDULE: '* * * * *'
      AWS_ENDPOINT_URL: http://garage:3900
      AWS_ACCESS_KEY_ID: GK3515373e4c851ebaad366558
      AWS_SECRET_ACCESS_KEY: 7d37d093435a41f2aab8f13c19ba067d9776c90215f56614adad6ece597dbb34
      AWS_DEFAULT_REGION: garage
      AWS_S3_BUCKET: pgbackups
      BLACKLISTED_DATABASES: .*backup.*|postgres|rdsadmin
      PGHOST: postgres
      PGPASSWORD: pgpass
      PGUSER: pguser

  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: pgpass
      POSTGRES_USER: pguser
      PGPASSWORD: pgpass
      PGUSER: pguser
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/dev/seed.sql:/seed.sql:ro

  garage:
    image: dxflrs/garage:v2.2.0
    environment:
      GARAGE_ADMIN_TOKEN: garage-admin-token
    configs:
      - source: garage-config
        target: /etc/garage.toml
    volumes:
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
    ports:
      - "3900:3900"

  garage-init:
    image: docker.io/alpine:3.23
    depends_on:
      garage:
        condition: service_started
    environment:
      GARAGE_ADMIN_TOKEN: garage-admin-token
    pid: service:garage
    network_mode: service:garage
    entrypoint:
      - /bin/sh
      - -eux
      - -c
      - |
        # chroot into the s3 container's filesystem so the garage binary runs
        # with its own libs/linker, while the shared network namespace keeps
        # 127.0.0.1:3901 pointing at the live Garage server
        G="chroot /proc/1/root /garage -c /etc/garage.toml"

        # Wait for server
        for i in $$(seq 1 20); do
          if $$G node id -q 2>/dev/null; then break; fi
          echo "Waiting for Garage RPC... ($$i/20)"
          sleep 3
        done
        $$G node id -q || { echo "Garage RPC not ready"; exit 1; }

        # Init garage nodes
        if $$G status 2>&1 | grep -q 'NO ROLE ASSIGNED'; then
          NODE_ID=$$($$G node id -q | cut -c1-16)
          $$G layout assign "$$NODE_ID" -z garage -c 1G
          $$G layout apply --version 1
        fi

        # Create S3 bucket
        $$G key import --yes -n pg253 \
          GK3515373e4c851ebaad366558 \
          7d37d093435a41f2aab8f13c19ba067d9776c90215f56614adad6ece597dbb34 || true
        $$G bucket create pgbackups || true
        $$G bucket allow pgbackups --key pg253 --read --write --owner || true

        echo "Garage initialized."

  # Observability
  prometheus:
    image: prom/prometheus
    configs:
      - source: prometheus-config
        target: /etc/prometheus/prometheus.yml
    volumes:
      - prometheus:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:12.4.2
    configs:
      - source: grafana-datasources
        target: /etc/grafana/provisioning/datasources/datasources.yml
      - source: grafana-dashboards
        target: /etc/grafana/provisioning/dashboards/dashboards.yml
    volumes:
      - ./contrib/grafana-dashboards/pg253.json:/var/lib/grafana/dashboards/pg253.json:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"

configs:
  garage-config:
    content: |
      metadata_dir = "/var/lib/garage/meta"
      data_dir = "/var/lib/garage/data"
      db_engine = "sqlite"

      replication_factor = 1
      compression_level = 1

      rpc_bind_addr = "[::]:3901"
      rpc_public_addr = "127.0.0.1:3901"
      rpc_secret = "5cd97ac1a44303475d5eab42378aa729eda15164c898eaac84116bcdfe85cddd"

      [s3_api]
      s3_region = "garage"
      api_bind_addr = "[::]:3900"

  prometheus-config:
    content: |
      global:
        scrape_interval: 5s
        scrape_timeout: 4s
        evaluation_interval: 1m
      scrape_configs:
      - job_name: pg253
        honor_timestamps: true
        scrape_interval: 5s
        scrape_timeout: 4s
        metrics_path: /metrics
        scheme: http
        static_configs:
        - targets:
          - pg253:9352
          labels:
            pg253: "true"

  grafana-datasources:
    content: |
      datasources:
      - name: Prometheus
        access: proxy
        type: prometheus
        url: http://prometheus:9090
        isDefault: true
  grafana-dashboards:
    content: |
      apiVersion: 1
      providers:
        - name: "PG253"
          orgId: 1
          type: file
          disableDeletion: false
          updateIntervalSeconds: 10
          allowUiUpdates: false
          options:
            path: /var/lib/grafana/dashboards
            foldersFromFilesStructure: true

volumes:
  pgdata:
  minio:
  prometheus:
  grafana_data:
  garage_meta:
  garage_data:

networks:
  default:
    enable_ipv6: true
